<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sabine — Floor plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1C3A2E; --green-soft:#2b5041;
    --ivory:#F4F0E6; --ivory-2:#faf7ef;
    --terra:#C0623C; --terra-soft:#d98b6a;
    --gold:#C9A961;
    --ink:#20302a;
    --line:#1C3A2E;
    --pad: clamp(20px, 5.2vw, 52px);
    --sans:"DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --disp:"Cormorant Garamond", Georgia, "Times New Roman", serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--ivory);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{ max-width:1120px; margin:0 auto; padding:clamp(20px,4vw,34px) var(--pad) clamp(14px,2.5vw,22px); }

  /* header */
  .eyebrow{ font-size:11px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--terra); font-weight:600; margin:0 0 10px; }
  h1{ font-family:var(--disp); font-style:italic; font-weight:600;
    font-size:clamp(34px,7vw,54px); line-height:1; margin:0 0 6px; color:var(--green); }
  .sub{ font-size:14px; color:#54615a; margin:0 0 clamp(22px,4vw,34px); max-width:52ch; }

  /* level tabs */
  .levels{ display:flex; gap:8px; flex-wrap:wrap; margin:0 0 clamp(18px,3vw,26px); }
  .lvl{ appearance:none; border:1px solid rgba(28,58,46,.22); background:transparent;
    color:var(--green); font-family:var(--sans); font-weight:500; font-size:13px;
    letter-spacing:.02em; padding:9px 18px; min-height:44px; border-radius:999px; cursor:pointer;
    transition:.18s ease; }
  .lvl:hover{ border-color:var(--green); }
  .lvl[aria-selected="true"]{ background:var(--green); color:var(--ivory-2); border-color:var(--green); }

  /* stage: plan + panel */
  .stage{ display:grid; grid-template-columns:1fr 300px; gap:clamp(20px,3vw,36px); align-items:start; }
  @media (max-width:760px){ .stage{ grid-template-columns:1fr; } }

  .plan-card{ background:var(--ivory-2); border:1px solid rgba(28,58,46,.10);
    border-radius:10px; padding:clamp(14px,3vw,26px); box-shadow:0 10px 34px rgba(28,58,46,.09); }
  svg.plan{ display:block; width:100%; height:auto; touch-action:manipulation; }
  .planimg{ position:relative; line-height:0; }
  .planimg img{ width:100%; height:auto; display:block; border-radius:6px; }
  .planimg svg.overlay{ position:absolute; inset:0; width:100%; height:100%; }
  .hot{ fill:transparent; stroke:transparent; cursor:pointer; transition:fill .16s ease; }
  .hot:hover{ fill:rgba(192,98,60,.16); }
  .hot.sel{ fill:rgba(192,98,60,.24); stroke:var(--terra); stroke-width:3; }
  .hot.outdoor:hover{ fill:rgba(201,169,97,.16); }
  .hot.outdoor.sel{ fill:rgba(201,169,97,.28); stroke:var(--gold); stroke-width:2.5; }
  /* room-name labels drawn on top of the real drawing (image mode). An ivory
     halo (paint-order:stroke) keeps them legible over furniture and floor tone. */
  .imglabel{ font-family:var(--sans); font-weight:600; fill:var(--green);
    text-anchor:middle; pointer-events:none; letter-spacing:.05em;
    paint-order:stroke; stroke:rgba(250,247,239,.94); stroke-width:7px;
    stroke-linejoin:round; text-transform:uppercase; }
  .imglabel.outdoor{ fill:#8a6a2c; }

  .room{ fill:rgba(28,58,46,.045); stroke:var(--line); stroke-width:2.4;
    stroke-linejoin:round; cursor:pointer; transition:fill .16s ease; }
  .room:hover{ fill:rgba(192,98,60,.16); }
  .room.sel{ fill:rgba(192,98,60,.24); stroke:var(--terra); stroke-width:3; }
  .room.outdoor{ fill:rgba(201,169,97,.10); stroke-dasharray:7 6; stroke-width:2; }
  .room.outdoor:hover{ fill:rgba(201,169,97,.22); }
  .room.outdoor.sel{ fill:rgba(201,169,97,.30); stroke:var(--gold); stroke-dasharray:0; }

  .rlabel{ font-family:var(--sans); font-size:12.5px; font-weight:500; fill:var(--green);
    text-anchor:middle; pointer-events:none; letter-spacing:.01em; }
  .rlabel.sm{ font-size:11px; }
  .rarea{ font-family:var(--sans); font-size:11px; fill:#6b7a71; text-anchor:middle;
    pointer-events:none; }

  /* detail panel */
  .panel{ position:sticky; top:20px; }
  @media (max-width:760px){ .panel{ position:static; } }
  .detail{ background:var(--green); color:var(--ivory-2); border-radius:10px;
    padding:20px 22px 22px; }
  @media(min-width:761px){ .detail{ min-height:150px; } }
  .detail .hint{ font-size:13.5px; color:rgba(244,240,230,.72); }
  .detail .rname{ font-family:var(--disp); font-style:italic; font-weight:600;
    font-size:29px; line-height:1.05; margin:2px 0 12px; }
  .detail .big{ font-size:34px; font-weight:600; letter-spacing:-.01em; }
  .detail .big small{ font-size:16px; font-weight:400; color:rgba(244,240,230,.7); margin-left:4px; }
  .detail .note{ font-size:16px; color:rgba(244,240,230,.86); font-weight:400; }
  .detail .cap{ font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--terra-soft); margin:14px 0 3px; }

  .totals{ margin-top:16px; display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; }
  .totals .t{ background:var(--ivory-2); border-radius:8px; padding:12px 13px; }
  .totals .t b{ display:block; font-family:var(--disp); font-style:italic; font-size:21px;
    color:var(--green); font-weight:600; }
  .totals .t span{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#6b7a71; }

  .foot{ margin-top:clamp(14px,2.5vw,20px); font-size:11px; color:#8a948d; letter-spacing:.02em; }
  .brand{ font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:var(--green);
    font-weight:600; margin-top:5px; }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="dev">GREEN COAST · ALBANIAN RIVIERA</p>
  <h1 id="unit">Sabine</h1>
  <p class="sub" id="tagline">Tap any room to see its size. Every space is drawn to scale from the registered plan.</p>

  <div class="levels" id="levels" role="tablist" aria-label="Floor levels"></div>

  <div class="stage">
    <div class="plan-card" id="planCard"></div>
    <div class="panel">
      <div class="detail" id="detail" aria-live="polite">
        <div class="hint">Tap a room on the plan to reveal its dimensions.</div>
      </div>
      <div class="totals" id="totals"></div>
    </div>
  </div>

  <p class="foot" id="foot">Areas approximate, taken from the registered plan. Furniture indicative.</p>
  <p class="brand">Sanders&nbsp;·&nbsp;London — Tirana</p>
</div>

}
function showDetail(room){
  if(!room){ detail.innerHTML='<div class="hint">Tap a room on the plan to see its name and size.</div>'; return; }
  var area = room.area || "";
  var body = /m\u00b2/.test(area)
    ? '<div class="big">'+area.replace(/\s*m\u00b2/,'<small>&nbsp;m\u00b2</small>')+'</div>'
    : (area ? '<div class="note">'+area+'</div>' : '');
  detail.innerHTML =
    '<div class="cap">'+(room.outdoor?"Outdoor space":"Room")+'</div>'+
    '<div class="rname">'+room.name+'</div>'+ body;
}
function makeHot(room, cls){
  const poly=document.createElementNS(SVGNS,"polygon");
  poly.setAttribute("points", room.points);
  poly.setAttribute("class", cls+(room.outdoor?" outdoor":""));
  poly.setAttribute("tabindex","0");
  poly.setAttribute("role","button");
  poly.setAttribute("aria-label", room.area ? room.name+", "+room.area : room.name);
  const pick=()=>{ if(selEl) selEl.classList.remove("sel"); poly.classList.add("sel"); selEl=poly; showDetail(room); };
  poly.addEventListener("click", pick);
  poly.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pick(); }});
  return poly;
}
function renderLevel(i){
  curLevel=i; selEl=null; showDetail(null);
  const lvl=UNIT.levels[i];
  const card=document.getElementById("planCard");
  card.innerHTML="";
  if(lvl.image){
    const wrap=document.createElement("div"); wrap.className="planimg";
    const img=document.createElement("img"); img.src=lvl.image; img.alt=lvl.name;
    const ov=document.createElementNS(SVGNS,"svg"); ov.setAttribute("class","overlay");
    ov.setAttribute("viewBox", lvl.viewbox); ov.setAttribute("preserveAspectRatio","none");
    lvl.rooms.forEach(room=> ov.appendChild(makeHot(room,"hot")));
    // room-name labels sit above the hotspots. font-size scales to the drawing.
    var vbw=parseFloat(lvl.viewbox.split(/\s+/)[2])||1000;
    var fs=Math.round(vbw*0.030);
    lvl.rooms.forEach(function(room){
      var c=room.labelAt || centroid(room.points);
      var lines=(room.label||room.name).split("\n");
      var t=document.createElementNS(SVGNS,"text");
      t.setAttribute("x",c[0]); t.setAttribute("y",c[1]);
      t.setAttribute("class","imglabel"+(room.outdoor?" outdoor":""));
      t.setAttribute("font-size",fs);
      var y0=c[1]-(lines.length-1)*fs*0.6;
      lines.forEach(function(ln,li){
        var ts=document.createElementNS(SVGNS,"tspan");
        ts.setAttribute("x",c[0]); ts.setAttribute("y",y0+li*fs*1.2);
        ts.textContent=ln; t.appendChild(ts);
      });
      ov.appendChild(t);
    });
    wrap.appendChild(img); wrap.appendChild(ov); card.appendChild(wrap);
    img.addEventListener("load", postH);
  } else {
    const s=document.createElementNS(SVGNS,"svg"); s.setAttribute("class","plan");
    s.setAttribute("viewBox", lvl.viewbox); s.setAttribute("preserveAspectRatio","xMidYMid meet");
    lvl.rooms.forEach(room=>{
      s.appendChild(makeHot(room,"room"));
      const [cx,cy]=centroid(room.points);
      const t=document.createElementNS(SVGNS,"text");
      t.setAttribute("x",cx); t.setAttribute("y",cy);
      t.setAttribute("class","rlabel"+(room.name.length>12?" sm":""));
      t.textContent=room.name; s.appendChild(t);
    });
    card.appendChild(s);
  }
  Array.from(levelsBar.children).forEach((b,bi)=>b.setAttribute("aria-selected", bi===i?"true":"false"));
  postH();
}
function boot(){
  document.getElementById("unit").textContent=UNIT.name;
  document.getElementById("dev").textContent=UNIT.development;
  if(UNIT.tagline) document.getElementById("tagline").textContent=UNIT.tagline;
  document.title=UNIT.name+" — Floor plan";
  // totals
  const tw=document.getElementById("totals");
  tw.innerHTML=(UNIT.totals||[]).map(t=>'<div class="t"><b>'+t.value+'</b><span>'+t.label+'</span></div>').join("");
  // level tabs
  levelsBar.innerHTML="";
  UNIT.levels.forEach((lvl,i)=>{
    const b=document.createElement("button");
    b.className="lvl"; b.textContent=lvl.name; b.setAttribute("role","tab");
    b.addEventListener("click",()=>renderLevel(i));
    levelsBar.appendChild(b);
  });
  if(UNIT.levels.length<=1) levelsBar.style.display="none";
  renderLevel(0);
}
/* PLAN-HEIGHT-FIX — do not remove; breaks the resize feedback loop.
   The old code measured document/body scrollHeight and posted it to the parent,
   which sized the iframe to it. But documentElement.scrollHeight equals the
   iframe's own viewport height once the parent applies our number, so we were
   measuring the height we'd just been given: measure -> parent sets (+buffer) ->
   iframe 'resize' fires -> re-measure the bigger viewport -> grow, every tick.
   Fix: measure the CONTENT wrapper only (its height is driven by content/width,
   never by the iframe's height), and OBSERVE that same wrapper — so a height-only
   iframe resize changes neither the measurement nor the observed box and cannot
   re-fire. A genuine width change (column reflow / rotate) still re-syncs. Sub-3px
   deltas are ignored and a burst cap disconnects as a last-resort runaway guard. */
function planContentHeight(){
  var w=document.querySelector(".wrap");
  return Math.ceil(w ? w.getBoundingClientRect().height : document.body.offsetHeight);
}
var lastH=0, posts=0, ro=null, queued=false;
function flush(){
  queued=false;
  var h=planContentHeight();
  if(!h || Math.abs(h-lastH)<3) return;      // no-op / sub-pixel jitter -> don't post
  lastH=h;
  try{ parent.postMessage({sandersPlanHeight: h}, "*"); }catch(e){}
  if(++posts>40 && ro){ ro.disconnect(); ro=null; }   // runaway guard (should never trip)
}
function postH(){ if(queued) return; queued=true; (window.requestAnimationFrame||function(f){setTimeout(f,16);})(flush); }
window.addEventListener("load", function(){ postH(); setTimeout(postH,120); setTimeout(postH,400); });
window.addEventListener("resize", postH);   // safe now: a height-only resize leaves content height unchanged -> bailed
window.addEventListener("orientationchange", function(){ setTimeout(postH,150); });
if(document.fonts && document.fonts.ready) document.fonts.ready.then(postH);
if(window.ResizeObserver){ ro=new ResizeObserver(postH); ro.observe(document.querySelector(".wrap")||document.body); }
boot();
postH();
</script>
